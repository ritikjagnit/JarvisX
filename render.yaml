services:
  - type: web
    name: jarvisx
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: python render_app.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_API_KEY
        sync: false
      - key: POLLINATIONS_API_KEY
        sync: false
      - key: WOLFRAM_ALPHA_APP_ID
        sync: false
